{% extends 'base.html' %}
{% block titulo %}{{ titulo }}{% endblock %}
{% block contenido %}
<div class="page-header">
  <div>
    <h1 class="page-title">{{ titulo }}</h1>
    <p class="page-subtitle">Completa los datos del complejo</p>
  </div>
  <a href="{% url 'lista_complejos' %}" class="btn-ghost"><i class="bi bi-arrow-left"></i> Volver</a>
</div>
<div class="form-card">
  <form method="POST" class="form-main">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<span class="field-error">{{ field.errors.0 }}</span>{% endif %}
    </div>
    {% endfor %}
    <div class="form-actions">
      <a href="{% url 'lista_complejos' %}" class="btn-ghost">Cancelar</a>
      <button type="submit" class="btn-primary"><i class="bi bi-check-lg"></i> Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
